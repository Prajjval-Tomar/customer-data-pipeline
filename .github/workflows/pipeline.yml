name: Backend Pipeline CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install Dependencies (FastAPI)
      run: |
        cd pipeline_service
        pip install -r requirements.txt

    - name: Install Dependencies (Flask)
      run: |
        cd mock_server
        pip install -r requirements.txt

    - name: Run Basic Python Check
      run: |
        python -m py_compile $(git ls-files '*.py')

    - name: Build Docker Images
      run: |
        docker compose build